name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY || secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      FIREBASE_DATABASE_URL: ${{ vars.NEXT_PUBLIC_FIREBASE_DATABASE_URL || secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
      FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID || secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID || secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create Firebase client environment
        run: |
          printf 'NEXT_PUBLIC_FIREBASE_API_KEY=%s\n' "$FIREBASE_API_KEY" > .env.local
          printf 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=%s\n' "$FIREBASE_AUTH_DOMAIN" >> .env.local
          printf 'NEXT_PUBLIC_FIREBASE_DATABASE_URL=%s\n' "$FIREBASE_DATABASE_URL" >> .env.local
          printf 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=%s\n' "$FIREBASE_PROJECT_ID" >> .env.local
          printf 'NEXT_PUBLIC_FIREBASE_APP_ID=%s\n' "$FIREBASE_APP_ID" >> .env.local

      - name: Verify Cloudflare Workers build
        run: npm run build

      - name: Verify Firebase Hosting build
        run: npm run build:firebase

      - name: Build and validate GitHub Pages output
        run: npm run build:github-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
